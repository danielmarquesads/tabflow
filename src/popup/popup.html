<!DOCTYPE html>
<html lang="en" data-i18n-doc-title="extName">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TabFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../shared/ui.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="head row between">
        <div class="brand">
          <div class="mark" aria-hidden="true">TF</div>
          <div>
            <h1 data-i18n="extName">TabFlow</h1>
            <p class="muted tiny" data-i18n="brandTagline">Local · open source</p>
          </div>
        </div>
        <span id="statusPill" class="pill" data-i18n="statusOff">Off</span>
      </header>

      <section class="panel stack keep-panel">
        <div class="row between">
          <div>
            <div class="label-strong" id="keepLabel" data-i18n="keepTabOpen">Keep this tab open</div>
            <p class="muted tiny" id="keepHint" data-i18n="keepTabOpenHint">
              TabFlow will never auto-close it
            </p>
          </div>
        </div>
        <button type="button" class="btn btn-block btn-keep" id="keepBtn" data-i18n="keepTabOpen">
          Keep this tab open
        </button>
      </section>

      <section class="panel stack">
        <div class="row between">
          <div>
            <div class="label-strong" data-i18n="autoClose">Auto-close</div>
            <p class="muted tiny" id="statusHint" data-i18n="autoCloseHint">Set a threshold to enable</p>
          </div>
          <label class="toggle" data-i18n-title="autoClose">
            <input type="checkbox" id="enabledToggle" />
            <span></span>
          </label>
        </div>

        <div class="row between">
          <div>
            <div class="label-strong" data-i18n="paused">Paused</div>
            <p class="muted tiny" data-i18n="pausedHint">Keep settings, stop closing</p>
          </div>
          <label class="toggle" data-i18n-title="paused">
            <input type="checkbox" id="pausedToggle" />
            <span></span>
          </label>
        </div>

        <div class="threshold">
          <label class="sr-only" for="thresholdValue" data-i18n="thresholdLabel">Inactivity threshold</label>
          <div class="threshold-grid">
            <input type="number" id="thresholdValue" min="1" step="1" value="1" />
            <select id="thresholdUnit" data-i18n-aria="thresholdLabel">
              <option value="minutes" data-i18n="unitMinutes">minutes</option>
              <option value="hours" selected data-i18n="unitHours">hours</option>
              <option value="days" data-i18n="unitDays">days</option>
              <option value="months" data-i18n="unitMonths">months</option>
            </select>
            <button type="button" class="btn btn-primary" id="saveThreshold" data-i18n="save">Save</button>
          </div>
        </div>
      </section>

      <section class="stat-grid">
        <div class="stat">
          <div class="value mono" id="statToday">0</div>
          <div class="label" data-i18n="closedToday">Closed today</div>
        </div>
        <div class="stat">
          <div class="value mono" id="statTabs">0</div>
          <div class="label" data-i18n="openTabs">Open tabs</div>
        </div>
      </section>

      <section class="panel stack">
        <div class="row between">
          <h2 class="section-title" data-i18n="wouldCloseNow">Would close now</h2>
          <button type="button" class="btn btn-sm btn-ghost" id="refreshPreview" data-i18n="refresh">
            Refresh
          </button>
        </div>
        <div id="previewList" class="list" role="list"></div>
        <button type="button" class="btn btn-block" id="runSweep" data-i18n="closeEligible">
          Close eligible now
        </button>
      </section>

      <footer class="foot row between">
        <button type="button" class="btn btn-sm btn-ghost" id="openArchive" data-i18n="archive">Archive</button>
        <button type="button" class="btn btn-sm btn-ghost" id="openOptions" data-i18n="settings">Settings</button>
      </footer>
    </div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
